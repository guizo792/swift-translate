<!DOCTYPE html>
<html>
<head>
  <title>Translate Options</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 400px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    select { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
    button { padding: 10px 15px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1557b0; }
  </style>
</head>
<body>
  <h2>Extension Settings</h2>
  <div class="form-group">
    <label for="lang">Target Language:</label>
    <select id="lang">
      <option value="en">English</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="zh-CN">Chinese (Simplified)</option>
      <option value="ja">Japanese</option>
      </select>
  </div>
  <button id="save">Save Options</button>
  <p id="status"></p>

  <script src="options.js"></script>
</body>
</html>
